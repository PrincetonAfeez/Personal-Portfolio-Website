{% extends "base.html" %}

{% block content %}
<section class="page-kicker">
  <p class="eyebrow">Contact</p>
  <h1>Let’s talk systems, service, and software</h1>
  <p>Use the form or reach out directly through the links below.</p>
</section>

<section class="section contact-layout">
  <div class="contact-direct">
    <h2>Direct links</h2>
    <a href="mailto:{{ public_contact_email }}">{{ public_contact_email }}</a>
    <a href="{{ public_github_url }}" rel="noreferrer">GitHub</a>
    <a href="{{ public_linkedin_url }}" rel="noreferrer">LinkedIn</a>
  </div>
  {% include "contact/partials/_contact_form.html" %}
</section>
{% endblock %}
